name: Build macOS Application

on: [push]

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: Install p7zip
        run: |
          brew install p7zip
          mkdir -p src/resources
          # For GitHub Actions, handle both Intel and Apple Silicon homebrew paths
          if [ -f "/opt/homebrew/bin/7z" ]; then
            cp /opt/homebrew/bin/7z src/resources/
            cp /opt/homebrew/lib/p7zip/7z.so src/resources/
          else
            cp /usr/local/bin/7z src/resources/
            cp /usr/local/lib/p7zip/7z.so src/resources/
          fi
          chmod +x src/resources/7z

      - name: Build application
        run: |
          pyinstaller --name "7Z GUI" --windowed --add-data "src/resources:resources" src/main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7zGUI-macos
          path: dist/7Z GUI.app